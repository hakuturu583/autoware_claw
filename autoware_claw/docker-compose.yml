  nemoclaw:
    image: autoware_claw-nemoclaw:latest
    tty: true
    stdin_open: true
    # Override entrypoint: nemoclaw-start requires capsh/Landlock which may not
    # be available in all container runtimes. Launch gateway directly instead.
    entrypoint: ["bash", "-c"]
    command:
      - |
        # Inject Brave API key at runtime (config file is gateway-writable)
        python3 -c "
        import json, os
        cfg_path = '/sandbox/.openclaw/openclaw.json'
        brave_key = os.environ.get('BRAVE_API_KEY', '')
        if brave_key:
            cfg = json.load(open(cfg_path))
            cfg.setdefault('plugins', {}).setdefault('entries', {}).setdefault('brave', {}).setdefault('config', {}).setdefault('webSearch', {})['apiKey'] = brave_key
            json.dump(cfg, open(cfg_path, 'w'), indent=2)
        " 2>/dev/null || true
        # Start gateway
        exec openclaw gateway run --port 18789
    user: gateway
    build:
      context: .
      dockerfile: docker/nemoclaw.Dockerfile
      args:
        NEMOCLAW_MODEL: gpt-4.1
        NEMOCLAW_PROVIDER_KEY: openai
        NEMOCLAW_PRIMARY_MODEL_REF: gpt-4.1
        NEMOCLAW_INFERENCE_BASE_URL: "https://api.openai.com/v1"
        NEMOCLAW_INFERENCE_API: openai-completions
        NEMOCLAW_DISABLE_DEVICE_AUTH: "1"
        NEMOCLAW_WEB_SEARCH_ENABLED: "1"
        AUTOWARE_MCP_URL: "http://host.docker.internal:8765"
        CHAT_UI_URL: "http://0.0.0.0:18789"
    # # Ollama dependency removed
    # depends_on:
    #   ollama:
    #     condition: service_healthy
    environment:
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:18789:18789"  # NemoClaw dashboard (localhost only)
    networks:
      - egress-net      # host MCP + OpenAI API + web search

# volumes:
