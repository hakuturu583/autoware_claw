services:
  ollama:
    image: ollama/ollama:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - internal-net
    healthcheck:
      # Healthy once ollama is serving and gemma4 model is available.
      # Model weights are pre-pulled into ollama-data volume during colcon build
      # (via ollama-pull service). No runtime pull needed.
      # Note: uses `ollama list` instead of /api/tags due to Ollama 0.22+ API issue.
      test: ["CMD-SHELL", "ollama list | grep -q gemma4"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 10s
    # Default entrypoint: ollama serve
    # Model is pre-cached in ollama-data volume by the ollama-pull build step.

  # One-shot service: pull gemma4 weights into ollama-data volume during colcon build.
  # Uses "setup" profile so it does NOT start with normal `docker compose up`.
  # No GPU required — just downloads model files.
  ollama-pull:
    image: ollama/ollama:latest
    profiles: ["setup"]
    volumes:
      - ollama-data:/root/.ollama
    entrypoint: >
      bash -c "
        ollama serve &
        for i in $$(seq 1 30); do
          curl -sf http://localhost:11434/api/tags >/dev/null 2>&1 && break;
          sleep 2;
        done;
        echo '[autoware_claw] Pulling gemma4 into ollama-data volume...';
        ollama pull gemma4;
        echo '[autoware_claw] gemma4 cached. Subsequent startups will skip download.';
      "

  nemoclaw:
    image: autoware_claw-nemoclaw:latest
    tty: true
    stdin_open: true
    # Override entrypoint: nemoclaw-start requires capsh/Landlock which may not
    # be available in all container runtimes. Launch gateway directly instead.
    entrypoint: ["bash", "-c"]
    command:
      - |
        # Apply model override
        python3 -c "
        import json, os
        cfg_path = os.path.expanduser('~/.openclaw/openclaw.json')
        cfg = json.load(open(cfg_path))
        cfg.setdefault('models', {})['primary'] = os.environ.get('NEMOCLAW_MODEL_OVERRIDE', 'gemma4')
        json.dump(cfg, open(cfg_path, 'w'), indent=2)
        " 2>/dev/null || true
        # Start gateway
        exec openclaw gateway run --port 18789
    user: gateway
    build:
      context: .
      dockerfile: docker/nemoclaw.Dockerfile
      args:
        NEMOCLAW_MODEL: gemma4
        NEMOCLAW_PROVIDER_KEY: ollama
        NEMOCLAW_PRIMARY_MODEL_REF: gemma4
        NEMOCLAW_INFERENCE_BASE_URL: "http://ollama:11434/v1"
        NEMOCLAW_INFERENCE_API: openai-completions
        NEMOCLAW_DISABLE_DEVICE_AUTH: "1"
        NEMOCLAW_WEB_SEARCH_ENABLED: "1"
        AUTOWARE_MCP_URL: "http://host.docker.internal:8765"
        CHAT_UI_URL: "http://0.0.0.0:18789"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - NEMOCLAW_MODEL_OVERRIDE=gemma4
      - NEMOCLAW_INFERENCE_API_OVERRIDE=openai-completions
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:18789:18789"  # NemoClaw dashboard (localhost only)
    networks:
      - internal-net    # ollama inference (Docker internal, no internet)
      - egress-net      # host MCP + web search (internet via NemoClaw L7 policy)

volumes:
  ollama-data:

networks:
  internal-net:
    driver: bridge
    internal: true      # ollama isolated — no external access
  egress-net:
    driver: bridge
    # NOT internal — NemoClaw needs internet for web search (e.g. Brave)
    # Security is enforced by NemoClaw's L7 network policy, not Docker network.
    # Allowed endpoints: Brave Search API, host MCP (:8765), etc.
    # See docker/autoware-overlay/autoware-mcp-policy.yaml
